<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MomentMarket • Own the Moment</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
  <style>
    .hero-video {
      position: fixed; top: 0; left: 0;
      width: 100%; height: 100%;
      object-fit: cover;
      z-index: -2;
      filter: brightness(0.55) contrast(1.15);
    }
    .hero-overlay {
      position: fixed; inset: 0;
      background: linear-gradient(to bottom, rgba(0,0,0,0.35), rgba(0,0,0,0.88));
      z-index: -1;
    }
  </style>
</head>
<body class="bg-black text-white overflow-hidden">
  <video autoplay loop muted playsinline class="hero-video" id="heroVideo">
    <source src="hero.mp4" type="video/mp4">
  </video>
  
  <div class="hero-overlay"></div>

  <!-- Navbar -->
  <nav class="fixed top-0 w-full bg-black/80 backdrop-blur-md z-50 border-b border-white/10">
    <div class="max-w-6xl mx-auto px-8 py-6 flex justify-between items-center">
      <div class="flex items-center gap-4">
        <div class="text-4xl">⚽</div>
        <span class="text-3xl font-bold tracking-tighter">MomentMarket</span>
      </div>
      <button onclick="connectWallet()" id="connectWalletBtn"
              class="px-8 py-3 bg-white text-black rounded-2xl font-semibold hover:bg-cyan-400 transition">
        Connect Wallet
      </button>
    </div>
  </nav>

  <!-- Hero -->
  <div class="min-h-screen flex items-center relative">
    <div class="max-w-4xl mx-auto px-8 text-center z-10 pt-20">
      <div class="inline-flex bg-white/10 px-6 py-2.5 rounded-3xl border border-white/20 mb-10 text-sm backdrop-blur-md">
        Powered by TxODDS • World Cup Hackathon
      </div>
      
      <h1 class="text-6xl md:text-7xl font-bold leading-none tracking-tighter mb-8">
        See the magic<br>before it becomes obvious
      </h1>
      
      <p class="max-w-xl mx-auto text-xl text-zinc-300 mb-12">
        Real-time football moments captured, verified on-chain, and turned into ownable NFTs.
      </p>

      <div class="flex flex-col sm:flex-row gap-5 justify-center">
        <button onclick="mintMoment()" 
                class="px-12 py-6 bg-white text-black font-bold rounded-3xl text-xl hover:bg-cyan-400 transition">
          Mint This Moment
        </button>
        <button onclick="viewMarketplace()" 
                class="px-12 py-6 border border-white/60 hover:bg-white/10 rounded-3xl text-xl transition">
          Browse Marketplace
        </button>
      </div>
    </div>
  </div>

  <!-- Marketplace Listings (hidden until Browse Marketplace is clicked) -->
  <div id="marketplaceSection" class="hidden relative z-10 max-w-5xl mx-auto px-8 pb-24">
    <h2 class="text-3xl font-bold mb-6">Marketplace</h2>
    <div id="listingsContainer" class="grid grid-cols-1 sm:grid-cols-2 gap-6"></div>
  </div>

  <!-- Mint Modal -->
  <div id="mintModal" class="hidden fixed inset-0 z-50 bg-black/80 backdrop-blur-sm flex items-center justify-center px-6">
    <div class="bg-zinc-900 border border-white/10 rounded-3xl p-8 max-w-md w-full">
      <div class="flex justify-between items-center mb-6">
        <h3 class="text-2xl font-bold">Mint a Moment</h3>
        <button onclick="closeMintModal()" class="text-zinc-400 hover:text-white text-xl">✕</button>
      </div>

      <!-- Step 1: pick fixture + event -->
      <div id="mintPickerStep">
        <label class="block text-sm text-zinc-400 mb-2">Match</label>
        <select id="fixtureSelect" class="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-3 mb-5 text-white">
          <option value="">Loading fixtures...</option>
        </select>

        <label class="block text-sm text-zinc-400 mb-2">Predicted event</label>
        <select id="momentTypeSelect" class="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-3 mb-6 text-white">
          <option value="">Loading options...</option>
        </select>

        <button onclick="generatePreview()"
                class="w-full py-4 bg-white text-black font-bold rounded-2xl hover:bg-cyan-400 transition">
          Generate Preview
        </button>
      </div>

      <!-- Step 2: show generated card, confirm or go back -->
      <div id="mintPreviewStep" class="hidden">
        <div id="previewImageWrap" class="w-full aspect-[3/4] bg-white/5 rounded-2xl mb-5 flex items-center justify-center overflow-hidden">
          <p class="text-zinc-500 text-sm">Generating card...</p>
        </div>
        <div class="flex gap-3">
          <button onclick="backToPicker()"
                  class="flex-1 py-4 border border-white/30 rounded-2xl hover:bg-white/10 transition">
            Back
          </button>
          <button onclick="confirmMint()"
                  class="flex-1 py-4 bg-white text-black font-bold rounded-2xl hover:bg-cyan-400 transition">
            Mint This
          </button>
        </div>
      </div>

      <p id="mintModalError" class="text-red-400 text-sm mt-3 hidden"></p>
    </div>
  </div>

  <!-- Status banner (replaces alert() which some in-app browsers block) -->
  <div id="statusBanner" class="hidden fixed top-24 left-1/2 -translate-x-1/2 z-[60] bg-zinc-900 border border-white/20 rounded-2xl px-6 py-3 text-sm max-w-[90vw] text-center shadow-xl"></div>

  <script>
    const video = document.getElementById('heroVideo');
    video.play().catch(() => {});

    const API_BASE = "https://momentsite-production.up.railway.app";
    let connectedWallet = null;
    let pendingMint = null; // { fixtureId, predictedEvent, match, imageUri }

    function showStatus(message, duration = 4000) {
      const banner = document.getElementById('statusBanner');
      banner.textContent = message;
      banner.classList.remove('hidden');
      clearTimeout(showStatus._t);
      showStatus._t = setTimeout(() => banner.classList.add('hidden'), duration);
    }

    async function viewMarketplace() {
      const section = document.getElementById('marketplaceSection');
      const container = document.getElementById('listingsContainer');
      section.classList.remove('hidden');
      section.scrollIntoView({ behavior: 'smooth', block: 'start' });
      container.innerHTML = '<p class="text-zinc-400">Loading listings...</p>';

      try {
        const res = await fetch(`${API_BASE}/api/marketplace/listings`);
        if (!res.ok) throw new Error(`Server responded ${res.status}`);
        const data = await res.json();
        const listings = Array.isArray(data) ? data : (data.listings || []);

        if (!listings.length) {
          container.innerHTML = '<p class="text-zinc-400">No listings yet.</p>';
          return;
        }

        container.innerHTML = listings.map((item) => `
          <div class="bg-white/5 border border-white/10 rounded-2xl p-6">
            <p class="font-semibold text-lg">${item.match || item.fixtureId || 'Moment'}</p>
            <p class="text-zinc-400 text-sm mt-1">${item.predictedEvent || ''}</p>
            <p class="text-zinc-300 mt-3">${item.price ? `Price: ${item.price}` : ''}</p>
          </div>
        `).join('');
      } catch (err) {
        console.error("Failed to load marketplace listings:", err);
        container.innerHTML = '<p class="text-red-400">Could not load listings. Backend may be unreachable.</p>';
      }
    }

    async function mintMoment() {
      if (!connectedWallet) {
        showStatus("Connect your wallet first so we know which address should own the minted moment.");
        return;
      }

      const modal = document.getElementById('mintModal');
      const fixtureSelect = document.getElementById('fixtureSelect');
      const momentTypeSelect = document.getElementById('momentTypeSelect');
      const errorEl = document.getElementById('mintModalError');
      errorEl.classList.add('hidden');
      modal.classList.remove('hidden');
      showPickerStep();

      fixtureSelect.innerHTML = '<option value="">Loading fixtures...</option>';
      momentTypeSelect.innerHTML = '<option value="">Loading options...</option>';

      try {
        const [fixturesRes, momentTypesRes] = await Promise.all([
          fetch(`${API_BASE}/api/fixtures`),
          fetch(`${API_BASE}/api/fixtures/moment-types`)
        ]);

        const fixturesData = await fixturesRes.json();
        const momentTypesData = await momentTypesRes.json();

        if (!fixturesRes.ok) throw new Error(fixturesData.error || "Could not load fixtures");
        if (!momentTypesRes.ok) throw new Error(momentTypesData.error || "Could not load moment types");

        const fixtures = fixturesData.fixtures || [];
        fixtureSelect.innerHTML = fixtures.length
          ? fixtures.map((f) => `<option value="${f.fixtureId}" data-match="${f.home} vs ${f.away}">${f.home} vs ${f.away}</option>`).join('')
          : '<option value="">No live fixtures right now</option>';

        const momentTypes = momentTypesData.momentTypes || [];
        momentTypeSelect.innerHTML = momentTypes
          .map((t) => `<option value="${t}">${t.replace('_', ' ')}</option>`).join('');
      } catch (err) {
        console.error("Failed to load mint options:", err);
        errorEl.textContent = "Could not load fixtures/moment types — backend may be unreachable.";
        errorEl.classList.remove('hidden');
      }
    }

    function showPickerStep() {
      document.getElementById('mintPickerStep').classList.remove('hidden');
      document.getElementById('mintPreviewStep').classList.add('hidden');
    }

    function showPreviewStep() {
      document.getElementById('mintPickerStep').classList.add('hidden');
      document.getElementById('mintPreviewStep').classList.remove('hidden');
    }

    function backToPicker() {
      pendingMint = null;
      document.getElementById('mintModalError').classList.add('hidden');
      showPickerStep();
    }

    function closeMintModal() {
      document.getElementById('mintModal').classList.add('hidden');
      pendingMint = null;
    }

    async function generatePreview() {
      const fixtureSelect = document.getElementById('fixtureSelect');
      const fixtureId = fixtureSelect.value;
      const match = fixtureSelect.selectedOptions[0]?.dataset.match || fixtureId;
      const predictedEvent = document.getElementById('momentTypeSelect').value;
      const errorEl = document.getElementById('mintModalError');
      errorEl.classList.add('hidden');

      if (!fixtureId || !predictedEvent) {
        errorEl.textContent = "Pick a match and a predicted event first.";
        errorEl.classList.remove('hidden');
        return;
      }

      showPreviewStep();
      const imageWrap = document.getElementById('previewImageWrap');
      imageWrap.innerHTML = '<p class="text-zinc-500 text-sm">Generating card...</p>';

      try {
        const res = await fetch(`${API_BASE}/api/predictions/preview`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ fixtureId, match, predictedEvent })
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.error || `Server responded ${res.status}`);

        pendingMint = { fixtureId, predictedEvent, match, imageUri: data.imageUri };
        imageWrap.innerHTML = `<img src="${data.imageUri}" alt="Predicted moment card" class="w-full h-full object-cover">`;
      } catch (err) {
        console.error("Preview generation failed:", err);
        imageWrap.innerHTML = '<p class="text-red-400 text-sm px-4 text-center">Could not generate preview.</p>';
        pendingMint = null;
      }
    }

    async function confirmMint() {
      const errorEl = document.getElementById('mintModalError');
      errorEl.classList.add('hidden');

      if (!pendingMint) {
        errorEl.textContent = "Generate a preview first.";
        errorEl.classList.remove('hidden');
        return;
      }

      try {
        const res = await fetch(`${API_BASE}/api/predictions`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            ownerPublicKey: connectedWallet,
            fixtureId: pendingMint.fixtureId,
            match: pendingMint.match,
            predictedEvent: pendingMint.predictedEvent,
            imageUri: pendingMint.imageUri
          })
        });
        const data = await res.json();
        if (!res.ok) {
          errorEl.textContent = `Mint failed: ${data.error || res.status}`;
          errorEl.classList.remove('hidden');
          return;
        }
        closeMintModal();
        showStatus("Moment minted! Asset: " + data.prediction.assetAddress, 6000);
      } catch (err) {
        console.error("Mint request failed:", err);
        errorEl.textContent = "Mint failed — backend unreachable.";
        errorEl.classList.remove('hidden');
      }
    }

    async function connectWallet() {
      const btn = document.getElementById('connectWalletBtn');
      if (window.solana && window.solana.isPhantom) {
        try {
          const resp = await window.solana.connect();
          connectedWallet = resp.publicKey.toString();
          const short = connectedWallet.slice(0, 4) + "…" + connectedWallet.slice(-4);
          if (btn) btn.textContent = short;
          showStatus("Wallet connected: " + connectedWallet, 5000);
        } catch (err) {
          console.error("Wallet connection rejected:", err);
          showStatus("Wallet connection was cancelled or rejected.");
        }
      } else {
        showStatus("No Solana wallet found in this browser. Open this site in Phantom's in-app browser, or install the Phantom extension on desktop.", 6000);
      }
    }
  </script>
</body>
</html>
